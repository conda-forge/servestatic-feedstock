context:
  version: "4.0.0"

package:
  name: servestatic
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/s/servestatic/servestatic-${{ version }}.tar.gz
    sha256: 212b80d4b0d07b2ab10e2e4419ed984f5e6ec2fee61b64e9ed1d7740b3c367a5

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0.0
    - asgiref
    - brotli

tests:
  - python:
      imports:
        - servestatic
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/Archmonger/ServeStatic/
  summary: Production-grade static file server for Python WSGI & ASGI.
  license: MIT
  license_file: LICENSE.md
  documentation: https://archmonger.github.io/ServeStatic/

extra:
  recipe-maintainers:
    - carlodri
